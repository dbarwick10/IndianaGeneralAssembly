{{ define "main" }}
<h1 class="title">Indiana Legislature Bill Tracker</h1>
<div class="search-container">
    <div class="relative">
        <input
            type="text"
            class="input"
            id="yearInput"
            value="2025"
            placeholder="Enter year (e.g., 2025)"
        />
        <input
            type="text"
            class="input"
            id="searchInput"
            placeholder="Enter legislator(s) separated by a comma... "
        />
        <ul class="autocomplete-dropdown" id="autocompleteDropdown"></ul>
    </div>
    <div id="header-legislators-action" class="header-legislators-action">
        <button id="find-my-legislators-btn" class="button small-button">Find My Legislators</button>
    </div>
    <div class="view-toggle">
        <span id="viewLabel">Bill View</span>
        <label class="switch">
            <input type="checkbox" id="viewToggle">
            <span class="slider round"></span>
        </label>
        <span id="viewLabel">Stats View</span>
    </div>
    <button class="button" id="searchButton">Search</button>
</div>
<div id="loading" class="loading-spinner hidden">
    <div class="spinner"></div>
    <div class="loading-text">Loading bills...</div>
</div>
<div id="results" class="space-y-6"></div>
<div id="noResults" class="no-results hidden">No bills found for your search.</div>
{{ end }}

{{ define "scripts" }}
<script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.1.0/wordcloud2.min.js"></script>
<script type="module" src="/js/index.js"></script>
{{ end }}
